<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
  </defs>

  <rect width="1200" height="620" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="36" fill="#e2e8f0" font-size="18" font-weight="700" text-anchor="middle">Context Isolation: Why Subagents Matter</text>
  <text x="600" y="54" fill="#64748b" font-size="12" text-anchor="middle">Each agent works in its own context window. The main conversation stays clean.</text>

  <!-- ============ MAIN AGENT BOX (center top) ============ -->
  <rect x="380" y="76" width="440" height="200" rx="10" fill="#3b82f6" opacity="0.06" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4"/>
  <text x="600" y="102" fill="#93c5fd" font-size="15" font-weight="700" text-anchor="middle">Main Agent</text>
  <text x="600" y="118" fill="#60a5fa" font-size="11" text-anchor="middle">Context: 200K tokens</text>

  <!-- Your prompt -->
  <rect x="420" y="134" width="140" height="40" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="490" y="158" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Your prompt</text>

  <!-- Arrow down -->
  <line x1="490" y1="174" x2="490" y2="194" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Plan -->
  <rect x="440" y="194" width="100" height="36" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="490" y="216" fill="#e2e8f0" font-size="12" text-anchor="middle">Plan</text>

  <!-- Arrow down -->
  <line x1="490" y1="230" x2="490" y2="250" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Orchestration -->
  <rect x="600" y="194" width="160" height="36" rx="6" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1"/>
  <text x="680" y="216" fill="#a78bfa" font-size="12" font-weight="600" text-anchor="middle">Orchestration</text>

  <!-- Arrow from Plan to Orchestration -->
  <line x1="540" y1="212" x2="600" y2="212" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ DELEGATE ARROWS ============ -->
  <!-- Left: Backend -->
  <path d="M 440 276 C 440 310 200 310 200 340" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrowBlue)"/>
  <text x="300" y="298" fill="#f59e0b" font-size="10" font-weight="600">delegate</text>

  <!-- Center: Frontend -->
  <line x1="600" y1="276" x2="600" y2="340" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrowCyan)"/>
  <text x="616" y="312" fill="#f59e0b" font-size="10" font-weight="600">delegate</text>

  <!-- Right: QA -->
  <path d="M 760 276 C 760 310 1000 310 1000 340" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrowGreen)"/>
  <text x="900" y="298" fill="#f59e0b" font-size="10" font-weight="600">delegate</text>

  <!-- ============ BACKEND AGENT ============ -->
  <rect x="60" y="340" width="280" height="160" rx="8" fill="#6366f1" opacity="0.06" stroke="#6366f1" stroke-width="1" stroke-opacity="0.4"/>
  <text x="200" y="366" fill="#a5b4fc" font-size="14" font-weight="700" text-anchor="middle">Backend Agent</text>
  <text x="200" y="382" fill="#64748b" font-size="10" text-anchor="middle">Own context window</text>

  <!-- Backend steps -->
  <rect x="80" y="396" width="120" height="32" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="140" y="416" fill="#e2e8f0" font-size="11" text-anchor="middle">Explores 50+ files</text>

  <line x1="140" y1="428" x2="140" y2="440" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="80" y="440" width="120" height="32" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="140" y="460" fill="#e2e8f0" font-size="11" text-anchor="middle">Scaffolds code</text>

  <!-- Return summary -->
  <rect x="220" y="440" width="100" height="44" rx="6" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="1"/>
  <text x="270" y="458" fill="#a5b4fc" font-size="10" font-weight="600" text-anchor="middle">Returns</text>
  <text x="270" y="472" fill="#a5b4fc" font-size="10" font-weight="600" text-anchor="middle">~500 tokens</text>

  <line x1="200" y1="456" x2="220" y2="462" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ============ FRONTEND AGENT ============ -->
  <rect x="460" y="340" width="280" height="160" rx="8" fill="#06b6d4" opacity="0.06" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.4"/>
  <text x="600" y="366" fill="#67e8f9" font-size="14" font-weight="700" text-anchor="middle">Frontend Agent</text>
  <text x="600" y="382" fill="#64748b" font-size="10" text-anchor="middle">Own context window</text>

  <!-- Frontend steps -->
  <rect x="480" y="396" width="120" height="32" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="540" y="416" fill="#e2e8f0" font-size="11" text-anchor="middle">Generates types</text>

  <line x1="540" y1="428" x2="540" y2="440" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="480" y="440" width="120" height="32" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="540" y="460" fill="#e2e8f0" font-size="11" text-anchor="middle">Builds forms</text>

  <!-- Return summary -->
  <rect x="620" y="440" width="100" height="44" rx="6" fill="#06b6d4" opacity="0.2" stroke="#06b6d4" stroke-width="1"/>
  <text x="670" y="458" fill="#67e8f9" font-size="10" font-weight="600" text-anchor="middle">Returns</text>
  <text x="670" y="472" fill="#67e8f9" font-size="10" font-weight="600" text-anchor="middle">~300 tokens</text>

  <line x1="600" y1="456" x2="620" y2="462" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ============ QA AGENT ============ -->
  <rect x="860" y="340" width="280" height="160" rx="8" fill="#22c55e" opacity="0.06" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1000" y="366" fill="#86efac" font-size="14" font-weight="700" text-anchor="middle">QA Agent</text>
  <text x="1000" y="382" fill="#64748b" font-size="10" text-anchor="middle">Own context window</text>

  <!-- QA steps -->
  <rect x="880" y="396" width="120" height="32" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="940" y="416" fill="#e2e8f0" font-size="11" text-anchor="middle">Reads all code</text>

  <line x1="940" y1="428" x2="940" y2="440" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="880" y="440" width="120" height="32" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="940" y="460" fill="#e2e8f0" font-size="11" text-anchor="middle">Writes 200+ tests</text>

  <!-- Return summary -->
  <rect x="1020" y="440" width="100" height="44" rx="6" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
  <text x="1070" y="458" fill="#86efac" font-size="10" font-weight="600" text-anchor="middle">Returns</text>
  <text x="1070" y="472" fill="#86efac" font-size="10" font-weight="600" text-anchor="middle">~400 tokens</text>

  <line x1="1000" y1="456" x2="1020" y2="462" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ============ SUMMARY RETURN ARROWS ============ -->
  <path d="M 270 484 C 270 540 500 540 540 570" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrowBlue)"/>
  <text x="350" y="530" fill="#94a3b8" font-size="9" font-weight="500">summary only</text>

  <line x1="600" y1="500" x2="600" y2="570" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrowCyan)"/>
  <text x="616" y="540" fill="#94a3b8" font-size="9" font-weight="500">summary only</text>

  <path d="M 1070 484 C 1070 540 700 540 660 570" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrowGreen)"/>
  <text x="860" y="530" fill="#94a3b8" font-size="9" font-weight="500">summary only</text>

  <!-- ============ FINAL OUTPUT ============ -->
  <rect x="480" y="570" width="240" height="36" rx="8" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="600" y="593" fill="#a78bfa" font-size="14" font-weight="700" text-anchor="middle">Final output</text>

  <!-- Key insight annotation -->
  <text x="600" y="620" fill="#475569" font-size="10" text-anchor="middle" visibility="hidden">Subagents use their own token budget. Main context stays lean.</text>
</svg>