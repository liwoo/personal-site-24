<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="1200" height="480" rx="12" fill="url(#bg)"/>

  <!-- ============ LEFT PANEL: WITH THYMA ============ -->
  <rect x="30" y="20" width="555" height="440" rx="10" fill="#22c55e" opacity="0.04" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
  <text x="50" y="50" fill="#4ade80" font-size="16" font-weight="700">WITH THYMA</text>
  <text x="50" y="68" fill="#86efac" font-size="11">Agent Remembers</text>

  <!-- Session 1 box -->
  <rect x="50" y="88" width="200" height="80" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="150" y="110" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Session 1</text>
  <text x="150" y="128" fill="#64748b" font-size="10" text-anchor="middle">Discovers Stripe rate limit,</text>
  <text x="150" y="142" fill="#64748b" font-size="10" text-anchor="middle">DateTime quirk, route ordering</text>
  <text x="150" y="156" fill="#64748b" font-size="10" text-anchor="middle">carbon.DateTime * dereference</text>

  <!-- Arrow to Thyma -->
  <line x1="250" y1="128" x2="290" y2="128" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowAmber)"/>

  <!-- Thyma memory box (central) -->
  <rect x="290" y="96" width="140" height="64" rx="8" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="360" y="120" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">Thyma</text>
  <text x="360" y="136" fill="#fbbf24" font-size="11" text-anchor="middle">writes to memory</text>
  <text x="360" y="150" fill="#d97706" font-size="9" text-anchor="middle">plain text, local, no cloud</text>

  <!-- Three memory types branching down -->
  <!-- Episodic -->
  <line x1="310" y1="160" x2="310" y2="186" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 3"/>
  <rect x="50" y="186" width="180" height="56" rx="6" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1"/>
  <text x="140" y="208" fill="#93c5fd" font-size="11" font-weight="600" text-anchor="middle">Episodic</text>
  <text x="140" y="224" fill="#60a5fa" font-size="9" text-anchor="middle">Stripe error on batches &gt; 100</text>
  <text x="140" y="236" fill="#60a5fa" font-size="9" text-anchor="middle">auth middleware missing on route</text>
  <line x1="230" y1="214" x2="310" y2="186" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Semantic -->
  <rect x="240" y="250" width="180" height="56" rx="6" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="1"/>
  <text x="330" y="272" fill="#86efac" font-size="11" font-weight="600" text-anchor="middle">Semantic</text>
  <text x="330" y="288" fill="#4ade80" font-size="9" text-anchor="middle">Route: search before {id}</text>
  <text x="330" y="300" fill="#4ade80" font-size="9" text-anchor="middle">Prefer testcontainers over mocks</text>
  <line x1="330" y1="250" x2="340" y2="186" stroke="#22c55e" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Procedural -->
  <rect x="50" y="250" width="180" height="56" rx="6" fill="#a78bfa" opacity="0.12" stroke="#a78bfa" stroke-width="1"/>
  <text x="140" y="272" fill="#c4b5fd" font-size="11" font-weight="600" text-anchor="middle">Procedural</text>
  <text x="140" y="288" fill="#a78bfa" font-size="9" text-anchor="middle">DateTime error → use * dereference</text>
  <text x="140" y="300" fill="#a78bfa" font-size="9" text-anchor="middle">TS fail → regenerate with --force</text>
  <line x1="180" y1="250" x2="310" y2="186" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Arrow down to Session 2 -->
  <line x1="360" y1="160" x2="360" y2="240" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 3"/>
  <path d="M 360 240 C 460 240 460 344 460 344" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Session 2 box -->
  <rect x="430" y="344" width="140" height="80" rx="6" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="1.5"/>
  <text x="500" y="368" fill="#4ade80" font-size="12" font-weight="600" text-anchor="middle">Session 2</text>
  <text x="500" y="386" fill="#86efac" font-size="10" text-anchor="middle">Reads memory first.</text>
  <text x="500" y="400" fill="#86efac" font-size="10" text-anchor="middle">Starts productive</text>
  <text x="500" y="414" fill="#86efac" font-size="10" text-anchor="middle">immediately.</text>

  <!-- Result badge -->
  <rect x="100" y="430" width="370" height="24" rx="12" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="1"/>
  <text x="285" y="447" fill="#4ade80" font-size="12" font-weight="700" text-anchor="middle">Zero re-establishment. Continuous learning.</text>

  <!-- ============ RIGHT PANEL: WITHOUT THYMA ============ -->
  <rect x="615" y="20" width="555" height="440" rx="10" fill="#ef4444" opacity="0.04" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3"/>
  <text x="635" y="50" fill="#fca5a5" font-size="16" font-weight="700">WITHOUT THYMA</text>
  <text x="635" y="68" fill="#ef4444" font-size="11">Every Session Starts Cold</text>

  <!-- Session 1 -->
  <rect x="635" y="96" width="160" height="72" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="715" y="118" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Session 1</text>
  <text x="715" y="136" fill="#64748b" font-size="10" text-anchor="middle">Discovers Stripe limit,</text>
  <text x="715" y="150" fill="#64748b" font-size="10" text-anchor="middle">DateTime quirk, routes</text>

  <!-- Arrow to knowledge lost -->
  <line x1="795" y1="132" x2="835" y2="132" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- Knowledge lost 1 -->
  <rect x="835" y="104" width="150" height="56" rx="6" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1"/>
  <text x="910" y="126" fill="#fca5a5" font-size="11" font-weight="600" text-anchor="middle">Session ends.</text>
  <text x="910" y="144" fill="#ef4444" font-size="11" text-anchor="middle">All knowledge lost.</text>

  <!-- Session 2 -->
  <rect x="635" y="196" width="160" height="72" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="715" y="218" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Session 2</text>
  <text x="715" y="236" fill="#64748b" font-size="10" text-anchor="middle">Re-discovers same</text>
  <text x="715" y="250" fill="#64748b" font-size="10" text-anchor="middle">Stripe limit, DateTime...</text>

  <!-- Arrow to knowledge lost -->
  <line x1="795" y1="232" x2="835" y2="232" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- Knowledge lost 2 -->
  <rect x="835" y="204" width="150" height="56" rx="6" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1"/>
  <text x="910" y="226" fill="#fca5a5" font-size="11" font-weight="600" text-anchor="middle">Session ends.</text>
  <text x="910" y="244" fill="#ef4444" font-size="11" text-anchor="middle">All knowledge lost.</text>

  <!-- Session 3 -->
  <rect x="635" y="296" width="160" height="72" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="715" y="318" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Session 3</text>
  <text x="715" y="336" fill="#64748b" font-size="10" text-anchor="middle">Same lessons.</text>
  <text x="715" y="350" fill="#64748b" font-size="10" text-anchor="middle">Same wasted time.</text>

  <!-- Arrow to knowledge lost -->
  <line x1="795" y1="332" x2="835" y2="332" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- Knowledge lost 3 -->
  <rect x="835" y="304" width="150" height="56" rx="6" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1"/>
  <text x="910" y="326" fill="#fca5a5" font-size="11" font-weight="600" text-anchor="middle">Session ends.</text>
  <text x="910" y="344" fill="#ef4444" font-size="11" text-anchor="middle">Again.</text>

  <!-- Downward chain arrows -->
  <line x1="910" y1="160" x2="910" y2="204" stroke="#ef4444" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowRed)"/>
  <line x1="910" y1="260" x2="910" y2="304" stroke="#ef4444" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowRed)"/>

  <!-- Repeat symbol -->
  <text x="1020" y="230" fill="#ef4444" font-size="28" text-anchor="middle" opacity="0.4">∞</text>
  <text x="1020" y="250" fill="#ef4444" font-size="9" text-anchor="middle">repeat</text>

  <!-- Result badge -->
  <rect x="685" y="400" width="370" height="40" rx="20" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1"/>
  <text x="870" y="417" fill="#fca5a5" font-size="12" font-weight="700" text-anchor="middle">2-3 days lost per sprint</text>
  <text x="870" y="433" fill="#ef4444" font-size="10" text-anchor="middle">re-establishing context that should persist</text>

  <!-- VS divider -->
  <line x1="600" y1="40" x2="600" y2="440" stroke="#334155" stroke-width="1" stroke-dasharray="6 4"/>
  <rect x="583" y="220" width="34" height="24" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="600" y="237" fill="#94a3b8" font-size="11" font-weight="700" text-anchor="middle">vs</text>
</svg>