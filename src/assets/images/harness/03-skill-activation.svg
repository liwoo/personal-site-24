<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="1200" height="460" rx="12" fill="url(#bg)"/>

  <!-- ============ LEFT PANEL: WITH FORCED-EVAL HOOK ============ -->
  <rect x="30" y="20" width="555" height="420" rx="10" fill="#22c55e" opacity="0.04" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
  <text x="50" y="50" fill="#4ade80" font-size="16" font-weight="700">WITH FORCED-EVAL HOOK</text>
  <text x="50" y="68" fill="#86efac" font-size="11">Deterministic activation</text>

  <!-- Step 1: You write skill + eval cases -->
  <rect x="50" y="90" width="200" height="56" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="150" y="114" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">You write a skill</text>
  <text x="150" y="130" fill="#64748b" font-size="10" text-anchor="middle">+ eval cases</text>

  <!-- Arrow -->
  <line x1="250" y1="118" x2="290" y2="118" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Hook forces evaluation -->
  <rect x="290" y="90" width="200" height="56" rx="6" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
  <text x="390" y="112" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">Hook forces YES/NO</text>
  <text x="390" y="128" fill="#fbbf24" font-size="11" text-anchor="middle">evaluation per skill</text>

  <!-- Arrow down -->
  <line x1="390" y1="146" x2="390" y2="180" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision: Agent picks up skill? -->
  <polygon points="390,180 480,220 390,260 300,220" fill="#334155" stroke="#64748b" stroke-width="1"/>
  <text x="390" y="216" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">Agent picks</text>
  <text x="390" y="230" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">up skill?</text>

  <!-- YES: 100% of the time -->
  <line x1="390" y1="260" x2="390" y2="306" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="410" y="286" fill="#22c55e" font-size="10" font-weight="700">100%</text>

  <!-- Uses your patterns -->
  <rect x="290" y="306" width="200" height="50" rx="6" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
  <text x="390" y="328" fill="#4ade80" font-size="13" font-weight="700" text-anchor="middle">Uses your patterns</text>
  <text x="390" y="344" fill="#86efac" font-size="10" text-anchor="middle">Every time. Zero variance.</text>

  <!-- NO branch: 0% false positives -->
  <line x1="480" y1="220" x2="530" y2="220" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="530" y1="220" x2="530" y2="306" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="494" y="210" fill="#86efac" font-size="9" font-weight="600">0% false</text>
  <text x="494" y="222" fill="#86efac" font-size="9" font-weight="600">positives</text>

  <!-- Skips irrelevant -->
  <rect x="500" y="306" width="70" height="50" rx="6" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="1"/>
  <text x="535" y="328" fill="#86efac" font-size="9" font-weight="600" text-anchor="middle">Correctly</text>
  <text x="535" y="340" fill="#86efac" font-size="9" font-weight="600" text-anchor="middle">skips</text>

  <!-- Result badge -->
  <rect x="100" y="380" width="370" height="40" rx="20" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="1"/>
  <text x="285" y="404" fill="#4ade80" font-size="13" font-weight="700" text-anchor="middle">100% activation · 0 false positives</text>

  <!-- ============ RIGHT PANEL: WITHOUT SKILL EVALS ============ -->
  <rect x="615" y="20" width="555" height="420" rx="10" fill="#ef4444" opacity="0.04" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3"/>
  <text x="635" y="50" fill="#fca5a5" font-size="16" font-weight="700">WITHOUT SKILL EVALS</text>
  <text x="635" y="68" fill="#ef4444" font-size="11">Coin-flip reliability</text>

  <!-- Step 1: You write a skill -->
  <rect x="635" y="90" width="180" height="56" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="725" y="118" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">You write a skill</text>
  <text x="725" y="132" fill="#64748b" font-size="10" text-anchor="middle">(no eval cases)</text>

  <!-- Arrow -->
  <line x1="815" y1="118" x2="855" y2="118" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Agent receives prompt -->
  <rect x="855" y="90" width="180" height="56" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="945" y="112" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">Agent receives</text>
  <text x="945" y="128" fill="#64748b" font-size="10" text-anchor="middle">matching prompt</text>

  <!-- Arrow down -->
  <line x1="945" y1="146" x2="945" y2="180" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision -->
  <polygon points="945,180 1035,220 945,260 855,220" fill="#334155" stroke="#64748b" stroke-width="1"/>
  <text x="945" y="216" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">Agent picks</text>
  <text x="945" y="230" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">up skill?</text>

  <!-- ~50% YES -->
  <line x1="855" y1="220" x2="790" y2="220" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="790" y1="220" x2="790" y2="306" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="808" y="252" fill="#86efac" font-size="10" font-weight="600">~50%</text>

  <!-- Uses patterns (sometimes) -->
  <rect x="715" y="306" width="150" height="50" rx="6" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="1" stroke-opacity="0.5"/>
  <text x="790" y="328" fill="#86efac" font-size="11" text-anchor="middle">Uses your patterns</text>
  <text x="790" y="344" fill="#64748b" font-size="10" text-anchor="middle">(when it feels like it)</text>

  <!-- ~50% NO -->
  <line x1="1035" y1="220" x2="1090" y2="220" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="1090" y1="220" x2="1090" y2="306" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="1055" y="252" fill="#fca5a5" font-size="10" font-weight="600">~50%</text>

  <!-- Ignores skill -->
  <rect x="1005" y="306" width="170" height="50" rx="6" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
  <text x="1090" y="326" fill="#fca5a5" font-size="11" font-weight="600" text-anchor="middle">Ignores skill, invents</text>
  <text x="1090" y="342" fill="#fca5a5" font-size="11" text-anchor="middle">own approach</text>

  <!-- Result badge -->
  <rect x="685" y="380" width="370" height="40" rx="20" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1"/>
  <text x="870" y="404" fill="#fca5a5" font-size="13" font-weight="700" text-anchor="middle">~50% activation · ±5pt variance between runs</text>

  <!-- VS divider -->
  <line x1="600" y1="40" x2="600" y2="420" stroke="#334155" stroke-width="1" stroke-dasharray="6 4"/>
  <rect x="583" y="210" width="34" height="24" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="600" y="227" fill="#94a3b8" font-size="11" font-weight="700" text-anchor="middle">vs</text>
</svg>